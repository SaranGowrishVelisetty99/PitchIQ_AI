services:
  - type: web
    name: chroma-db
    env: docker
    repo: https://github.com/YOUR_USERNAME/pitchiq-ai
    dockerfilePath: ./chroma-service/Dockerfile
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
